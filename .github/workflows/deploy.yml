name: Deploy Tenri Spa

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ══════════════════════════════════════════════
  # JOB 1 — TESTS BACKEND PHP
  # ══════════════════════════════════════════════
  test-backend:
    name: 🧪 Tests Backend (PHP)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: tenri_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, zip, bcmath, tokenizer, xml, ctype, json
          coverage: none

      - name: 📦 Instalar dependencias
        run: |
          cd backend
          composer install --no-interaction --prefer-dist

      - name: 🔧 Preparar .env de test
        run: |
          cd backend
          cp .env.testing .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=tenri_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=/' .env
          php artisan key:generate

      - name: 🧪 Correr tests PHP
        run: |
          cd backend
          php artisan test --stop-on-failure

  # ══════════════════════════════════════════════
  # JOB 2 — TESTS FRONTEND (lint + build)
  # ══════════════════════════════════════════════
  test-frontend:
    name: 🧪 Tests Frontend (lint + build)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Instalar dependencias
        run: |
          cd frontend
          npm install -g pnpm
          pnpm install --frozen-lockfile

      - name: 🔍 Lint
        run: |
          cd frontend
          pnpm lint

      - name: 🏗️ Build
        env:
          VITE_API_URL: /api
          VITE_ROOT_URL: ''
        run: |
          cd frontend
          pnpm build

  # ══════════════════════════════════════════════
  # JOB 3 — DEPLOY (solo main + ambos tests OK)
  # ══════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── Frontend ──
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Instalar dependencias frontend
        run: |
          cd frontend
          npm install -g pnpm
          pnpm install --frozen-lockfile

      - name: 🏗️ Build frontend
        env:
          VITE_API_URL: /api
          VITE_ROOT_URL: ''
        run: |
          cd frontend
          pnpm build

      - name: 🚀 Subir frontend a public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: /public_html/
          dangerous-clean-slate: false

      # ── Backend ──
      - name: ⚙️ Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, zip, bcmath, tokenizer, xml, ctype, json

      - name: 📦 Instalar dependencias backend
        run: |
          cd backend
          composer install --optimize-autoloader --no-dev --no-interaction

      - name: 🗜️ Comprimir backend
        run: |
          cd backend
          zip -r ../backend.zip . \
            -x "*.git*" \
            -x "tests/*" \
            -x "node_modules/*" \
            -x ".env*" \
            -x "storage/logs/*" \
            -x "storage/framework/cache/*" \
            -x "storage/framework/sessions/*" \
            -x "storage/framework/views/*"

      - name: 🚀 Subir backend comprimido
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /tenri_backend/
          exclude: |
            **/*
            !backend.zip

      # ── Servidor ──
      - name: 🛠️ Descomprimir y configurar Laravel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 22
          script: |
            set -e
            cd ~/tenri_backend

            unzip -o backend.zip
            rm backend.zip

            chmod -R 775 storage bootstrap/cache
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/views
            mkdir -p storage/framework/cache
            mkdir -p storage/logs

            rm -rf ~/public_html/api
            ln -s ~/tenri_backend/public ~/public_html/api

            php artisan optimize:clear
            php artisan migrate --force

            php artisan tinker --execute="
              if (\App\Domain\Catalog\Models\Service::count() === 0) {
                \Artisan::call('db:seed', ['--force' => true]);
                echo 'Seeded OK';
              } else {
                \Artisan::call('db:seed', ['--class' => 'ServiceSeeder', '--force' => true]);
                echo 'ServiceSeeder updated';
              }
            "

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            php artisan storage:link --force 2>/dev/null || true

            echo "Deploy completado OK"
